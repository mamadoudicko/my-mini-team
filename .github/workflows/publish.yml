name: Publish to npm

# Publishes @mamadoudicko/mmt to npm when a GitHub Release is published
# (or manually via the Actions tab). Requires an NPM_TOKEN repo secret
# (npm automation token with publish rights on the @mamadoudicko scope).

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish (public scoped package)
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          MMT_NO_POSTINSTALL: '1'
