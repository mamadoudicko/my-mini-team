team: spec-to-prod
about: take an agreed spec to prod — plan, build, review loop, qa, audit (no spec challenging; we already know what we want)
steps:
  - member: strategist
    does: turn the spec into a short technical plan

  - member: coder
    does: implement the plan
    skills: [github-pr, ticket-status]

  - loop:
      until: reviewer approves
      max_rounds: 3
      steps:
        - member: reviewer
          does: review the diff on the PR
          skills: [github-comment]
        - member: coder
          does: address the review comments
          skills: [github-pr]

  - member: qa
    does: run the tests and exercise the change
    skills: [run-tests, github-post]

  - member: reporter
    does: publish a concise run audit as a collapsible comment on the PR
    skills: [publish-report]
