team: idea-to-prod
about: take a raw idea all the way to prod — publish the issue as a first draft early, iterate it in place with a challenger, get explicit user validation, then build, review, qa, audit
lead: Whenever a member is genuinely uncertain, hits an ambiguous decision, or faces a choice that is the user's to make, pause and ask the user (end with `NEEDS INPUT:` and the questions, or use an interactive member) instead of guessing. Bias toward asking when it's relevant or you're in doubt — a good question now beats a wrong assumption later.
steps:
  - member: clarifier
    interactive: true
    does: understand the idea; if key details are missing (goal, scope, constraints, acceptance), ask the user targeted questions and fold the answers in

  - member: issue-writer
    does: draft the first version of the spec — title, context, goal, scope, acceptance criteria, files/pointers, out-of-scope

  - member: publisher
    does: publish the draft spec as a GitHub issue right away (first draft), and return its URL — the challenge and iteration then happen on this live issue
    skills: [spec-publish]

  - loop:
      until: challenger confirms there is enough context to implement it right the first time
      max_rounds: 3
      steps:
        - member: challenger
          does: adversarially challenge the published issue — find ambiguities, missing context, unstated assumptions, weak or missing acceptance criteria; demand exactly what is needed to get it right first-try
        - member: issue-writer
          does: address the challenger's gaps and update the published GitHub issue in place (edit it), keeping it the single source of truth

  - member: approver
    interactive: true
    does: present the finalized issue to the user for an explicit go/no-go; only proceed once the user approves, folding in any last changes to the issue

  - member: validator
    interactive: true
    does: after the issue is approved, get a final user validation before building — confirm the scope and technical approach, surface any last constraints or preferences, and only then start the build

  - member: strategist
    does: turn the approved, validated issue into a short technical plan

  - member: coder
    does: implement the plan and open a PR
    skills: [github-pr, ticket-status]

  - loop:
      until: reviewer approves
      max_rounds: 3
      steps:
        - member: reviewer
          does: review the diff on the PR for correctness bugs and real blockers
          skills: [github-comment]
        - member: coder
          does: address the review comments and update the PR
          skills: [github-pr]

  - member: qa
    does: run the tests and exercise the change end to end
    skills: [run-tests, github-post]

  - member: reporter
    does: publish a concise run audit as a collapsible comment on the PR
    skills: [publish-report]
