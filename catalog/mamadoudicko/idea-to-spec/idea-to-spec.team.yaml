team: idea-to-spec
about: formulate a raw idea into a clear, implementable spec (in your tracker of choice — GitHub, Notion, …), challenged until it's right first-try
example: we keep losing customers after their first booking — figure out what to build
steps:
  - member: clarifier
    interactive: true
    does: understand the idea; if key details are missing (goal, scope, constraints, acceptance), ask the user targeted questions and fold the answers in

  - member: issue-writer
    does: draft a clear spec — title, context, goal, scope, acceptance criteria, files/pointers, out-of-scope

  - loop:
      until: challenger confirms there is enough context to implement it right the first time
      max_rounds: 3
      steps:
        - member: challenger
          does: adversarially challenge the draft — find ambiguities, missing context, unstated assumptions, weak or missing acceptance criteria; demand exactly what is needed to get the implementation right first-try
        - member: issue-writer
          does: address the challenger's gaps and tighten the spec

  - member: publisher
    does: publish the finalized spec to the user's tracker of choice (GitHub Issues, Notion, Linear, …) — surface which tool and confirm before creating, then return its URL
    skills: [spec-publish]
